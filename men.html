<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قسم الرجال</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        header { background: #2c3e50; padding: 20px; text-align: center; color: white; }
        nav a { color: #3498db; margin: 0 15px; text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 10px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>ملابس الرجال</h1>
        <nav><a href="index.html">الرئيسية</a> | <a href="men.html">رجال</a> | <a href="women.html">نساء</a></nav>
    </header>
    <div class="grid" id="men-list"></div>
    <script>
        const list = document.getElementById('men-list');
        for(let i=0; i<20; i++) {
            list.innerHTML += `<div class="card"><img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400"><p>قميص رجالي ${i+1}</p></div>`;
        }
    </script>
</body>
</html>
