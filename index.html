<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>نموذج الاتصال</title>
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">
    <div class="card p-4 shadow">
        <h2 class="mb-4">تواصل معنا</h2>
        
        <form class="needs-validation" action="https://formspree.io/f/xgojnlqd" method="POST" novalidate>
            
            <div class="mb-3">
                <label for="fullName" class="form-label">الاسم بالكامل</label>
                <input type="text" class="form-control" id="fullName" name="name" required>
                <div class="invalid-feedback">يرجى إدخال اسمك الكامل.</div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">رقم الهاتف</label>
                <input type="tel" class="form-control" id="phone" name="phone" required>
                <div class="invalid-feedback">يرجى إدخال رقم هاتف صحيح.</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control" id="email" name="email" required>
                <div class="invalid-feedback">يرجى إدخال بريد إلكتروني صحيح.</div>
            </div>

            <div class="mb-3">
                <label for="service" class="form-label">نوع الخدمة المطلوبة</label>
                <select class="form-select" id="service" name="service" required>
                    <option value="">اختر الخدمة...</option>
                    <option value="web">تطوير ويب</option>
                    <option value="design">تصميم جرافيك</option>
                </select>
                <div class="invalid-feedback">يرجى اختيار خدمة.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">إرسال الطلب</button>
        </form>
    </div>
</div>

<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

</body>
</html>
