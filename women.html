<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قسم النساء | مودا ستايل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
    
    /* شريط التنقل المتجاوب */
    nav { background: #2c3e50; color: white; padding: 15px; text-align: center; }
    nav a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; font-size: 14px; }
    
    /* شبكة المنتجات الذكية */
    .grid { 
        display: grid; 
        padding: 20px; 
        gap: 20px;
        /* هذا السطر هو السر: يغير عدد الأعمدة حسب الشاشة */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    }
    
    .product-card { 
        background: white; 
        padding: 15px; 
        border-radius: 10px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        text-align: center; 
        transition: transform 0.3s;
    }
    .product-card:hover { transform: scale(1.02); }
    .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
    .product-card button { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; }

    /* تعديل خاص للجوالات */
    @media (max-width: 600px) {
        nav a { font-size: 12px; margin: 0 5px; }
        h1 { font-size: 20px; }
    }
</style>
</head>
<body>

    <nav>
<div class="logo" style="font-size: 28px; font-weight: bold; color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
    ✦ M O D A  S T Y L E ✦
</div>        <a href="index.html">الرئيسية</a>
        <a href="men.html">الرجال</a>
        <a href="women.html">النساء</a>
        <a href="cart.html">السلة 🛒</a>
        <a href="admin.html">إدارة المتجر</a>
    </nav>

    <h1 style="text-align:center;">تشكيلة النساء</h1>
    
    <div id="grid" class="grid"></div>

    <script>
        // 1. جلب البيانات من ذاكرة المتصفح
        let allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
        
        // 2. فلترة المنتجات لتظهر فقط ما صنفته "نساء" (women)
        const products = allProducts.filter(p => p.category === 'women'); 

        // 3. عرض المنتجات
        const grid = document.getElementById('grid');
        
        if (products.length === 0) {
            grid.innerHTML = "<p style='text-align:center; width:100%;'>لا توجد منتجات في قسم النساء حالياً.</p>";
        } else {
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <p>السعر: ${p.price} $</p>
                        <button onclick="addToCart('${p.name}', '${p.price}')">إضافة للسلة</button>
                    </div>`;
            });
        }

        // 4. وظيفة الإضافة للسلة
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.push({ name, price });
            localStorage.setItem('myCart', JSON.stringify(cart));
            alert("تم إضافة " + name + " إلى السلة!");
        }
    </script>

</body>
</html>
